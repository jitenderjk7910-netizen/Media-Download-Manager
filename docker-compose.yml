version: "3.9"

services:
  mdm:
    build: .
    container_name: media-download-manager
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./downloads:/app/downloads
      - ./uploads:/app/uploads
      - ./templates/saved_configs:/app/templates/saved_configs
    env_file:
      - .env
    environment:
      - NO_BROWSER=1
      - PRODUCTION=1
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
